<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menu Famille</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ivoire: #faf8f4;
  --ivoire-2: #f2ede4;
  --ivoire-3: #e8e0d0;
  --sauge: #5c7a5f;
  --sauge-2: #7a9e7e;
  --sauge-pale: #e8f0e8;
  --sauge-xpale: #f2f6f2;
  --terra: #b5603a;
  --terra-pale: #f7ede7;
  --ardoise: #3d4a3e;
  --gris: #8a8a7a;
  --gris-2: #c8c4b8;
  --texte: #2a2a24;
  --texte-2: #5a5a50;
  --or: #c4a55a;
  --or-pale: #faf3e0;
  --bleu: #4a7a8a;
  --bleu-pale: #e8f2f5;
  --rose: #c0506a;
  --rose-pale: #fde8f0;
  --r: 16px; --rsm: 10px;
  --ombre: 0 2px 16px rgba(60,50,30,.07);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--ivoire); color: var(--texte); padding-bottom: 90px; }

/* HEADER */
.hdr { background: var(--ardoise); padding: 24px 16px 18px; }
.hdr-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--sauge-2); margin-bottom: 5px; }
.hdr-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--ivoire); margin-bottom: 14px; }
.hdr-title span { color: var(--sauge-2); }
.week-row { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.week-row::-webkit-scrollbar { display: none; }
.wbtn { flex-shrink: 0; padding: 7px 14px; border-radius: 30px; border: 1.5px solid rgba(255,255,255,.15); background: transparent; color: rgba(255,255,255,.5); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; min-height: 36px; white-space: nowrap; transition: all .2s; }
.wbtn.on { background: var(--sauge); border-color: var(--sauge); color: #fff; font-weight: 600; }
.wbtn small { display: block; font-size: 10px; opacity: .75; }

/* NAV */
.nav { display: flex; background: #fff; border-bottom: 1px solid var(--ivoire-3); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(60,50,30,.06); }
.nbtn { flex: 1; min-height: 50px; border: none; background: none; font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500; color: var(--gris); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; letter-spacing: .3px; }
.nbtn .ni { font-size: 16px; }
.nbtn.on { color: var(--sauge); font-weight: 600; border-bottom: 2px solid var(--sauge); }

/* CONTENT */
#content { padding: 16px; }

/* CARDS génériques */
.card { background: #fff; border-radius: var(--r); box-shadow: var(--ombre); margin-bottom: 10px; overflow: hidden; }

/* Menu card */
.mcard { display: flex; align-items: flex-start; padding: 13px 14px; gap: 12px; }
.mcard-day { flex-shrink: 0; width: 54px; text-align: center; }
.mcard-emoji { font-size: 20px; display: block; margin-bottom: 2px; }
.mcard-dayname { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .8px; text-transform: uppercase; }
.mcard-body { flex: 1; }
.mcard-plat { font-size: 15px; font-weight: 500; line-height: 1.4; margin-bottom: 7px; }
.mcard-plat em { font-style: italic; color: var(--gris); font-size: 13px; }
.mcard-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gris); flex-shrink: 0; padding-top: 3px; }

/* Tags */
.tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { border-radius: 20px; padding: 2px 8px; font-size: 10px; font-weight: 600; }
.t-af { background: var(--sauge-xpale); color: var(--sauge); }
.t-ex { background: var(--terra-pale); color: var(--terra); }
.t-4a { background: var(--bleu-pale); color: var(--bleu); }
.t-bt { background: var(--or-pale); color: var(--or); }
.t-tr { background: var(--ivoire-2); color: var(--texte-2); }
.t-cf { background: var(--rose-pale); color: var(--rose); }

/* Day border colors */
.dc-lundi { border-left: 3px solid var(--sauge); }
.dc-mardi { border-left: 3px solid var(--bleu); }
.dc-mercredi { border-left: 3px solid var(--or); }
.dc-jeudi { border-left: 3px solid var(--terra); }
.dc-vendredi { border-left: 3px solid var(--bleu); }
.dc-samedi { border-left: 3px solid var(--rose); }
.dc-dimanche { border-left: 3px solid var(--sauge-2); }
.dc-lundi .mcard-dayname { color: var(--sauge); }
.dc-mardi .mcard-dayname, .dc-vendredi .mcard-dayname { color: var(--bleu); }
.dc-mercredi .mcard-dayname { color: var(--or); }
.dc-jeudi .mcard-dayname { color: var(--terra); }
.dc-samedi .mcard-dayname { color: var(--rose); }
.dc-dimanche .mcard-dayname { color: var(--sauge-2); }

/* Proteins bar */
.pbar { background: #fff; border-radius: var(--rsm); padding: 11px 13px; margin-bottom: 12px; font-size: 13px; color: var(--texte-2); line-height: 1.6; border: 1px solid var(--ivoire-3); }
.pbar strong { color: var(--ardoise); }

/* Recettes accordeon */
.rcard { background: #fff; border-radius: var(--r); box-shadow: var(--ombre); margin-bottom: 10px; overflow: hidden; }
.rhead { padding: 15px 15px 12px; cursor: pointer; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; -webkit-user-select: none; user-select: none; }
.rhead-left { flex: 1; }
.rjour { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--sauge); margin-bottom: 3px; }
.rtitre { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--ardoise); line-height: 1.25; margin-bottom: 7px; }
.rchev { color: var(--sauge-2); font-size: 14px; transition: transform .25s; flex-shrink: 0; margin-top: 4px; }
.rchev.open { transform: rotate(180deg); }
.rbody { display: none; padding: 0 15px 15px; border-top: 1px solid var(--ivoire-2); }
.rbody.open { display: block; }
.rsec { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--sauge); margin: 14px 0 7px; }
.ings { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.ings li { font-size: 13px; padding: 7px 11px; background: var(--ivoire); border-radius: var(--rsm); line-height: 1.4; }
.ings li::before { content: "—"; color: var(--sauge-2); margin-right: 7px; font-size: 11px; }
.ing-store { font-size: 11px; color: var(--sauge); display: block; margin-top: 1px; }
.ing-yuka { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gris); float: right; }
.steps { list-style: none; counter-reset: s; display: flex; flex-direction: column; gap: 5px; }
.steps li { font-size: 13px; line-height: 1.5; padding: 9px 11px 9px 38px; background: var(--ivoire-2); border-radius: var(--rsm); position: relative; counter-increment: s; }
.steps li::before { content: counter(s); position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 19px; height: 19px; background: var(--sauge); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace; }
.box { border-radius: var(--rsm); padding: 10px 12px; margin-top: 7px; font-size: 13px; line-height: 1.5; }
.blbl { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 4px; }
.b4a { background: var(--bleu-pale); } .b4a .blbl { color: var(--bleu); }
.bsnt { background: var(--sauge-xpale); } .bsnt .blbl { color: var(--sauge); }
.btrv { background: var(--or-pale); } .btrv .blbl { color: var(--or); }
.bsyn { background: var(--ivoire-2); } .bsyn .blbl { color: var(--texte-2); }
.bexp { background: var(--terra-pale); } .bexp .blbl { color: var(--terra); }
.bbat { border-radius: var(--rsm); padding: 10px 12px; margin-top: 7px; font-size: 13px; line-height: 1.5; }
.bbat-a { background: var(--or-pale); border: 1.5px solid var(--or); } .bbat-a .blbl { color: var(--or); }
.bbat-b { background: var(--terra-pale); border: 1.5px solid rgba(181,96,58,.3); } .bbat-b .blbl { color: var(--terra); }

/* Plan B */
.planb-intro { background: var(--terra-pale); border-radius: var(--rsm); padding: 11px 13px; font-size: 13px; color: var(--terra); line-height: 1.55; margin-bottom: 14px; border-left: 3px solid var(--terra); }
.pcard { background: #fff; border-radius: var(--r); box-shadow: var(--ombre); padding: 16px; margin-bottom: 10px; }
.pnum { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: var(--sauge); color: #fff; border-radius: 50%; font-weight: 700; font-size: 13px; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.ptitle { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--ardoise); margin-bottom: 5px; line-height: 1.3; }
.pbadge { display: inline-block; background: var(--sauge-xpale); color: var(--sauge); border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
.psteps { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.psteps li { font-size: 13px; padding: 7px 10px; background: var(--ivoire); border-radius: var(--rsm); line-height: 1.4; }
.pings { margin-top: 9px; font-size: 11px; color: var(--gris); font-style: italic; font-family: 'DM Mono', monospace; line-height: 1.5; }
.batch-box { background: #fff; border-radius: var(--r); box-shadow: var(--ombre); padding: 16px; margin-bottom: 10px; }
.batch-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--ardoise); margin-bottom: 10px; }

/* Snacks */
.scard { background: #fff; border-radius: var(--r); box-shadow: var(--ombre); padding: 16px; margin-bottom: 10px; }
.shdr { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.semoji { font-size: 28px; }
.stitle { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--ardoise); line-height: 1.3; }
.swhen { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gris); margin-bottom: 7px; }
.show { font-size: 13px; line-height: 1.55; color: var(--texte-2); }

/* Courses */
.budget { background: var(--ardoise); color: var(--ivoire); border-radius: var(--r); padding: 14px 16px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
.blabel { font-size: 11px; opacity: .7; font-family: 'DM Mono', monospace; }
.bamt { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--sauge-2); }
.bsub { font-size: 10px; opacity: .6; margin-top: 1px; }
.ctop { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cpteur { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--sauge); }
.creset { background: var(--ivoire-2); color: var(--texte-2); border: none; border-radius: 20px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; min-height: 34px; }
.ccat { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--sauge); margin: 16px 0 7px 2px; }
.citem { display: flex; align-items: flex-start; gap: 10px; padding: 10px 13px; background: #fff; border-radius: var(--rsm); margin-bottom: 5px; box-shadow: 0 1px 4px rgba(60,50,30,.04); cursor: pointer; }
.citem.delhaize { border-left: 2px solid var(--terra); }
.citem input[type=checkbox] { width: 20px; height: 20px; min-width: 20px; accent-color: var(--sauge); cursor: pointer; margin-top: 2px; }
.citem label { flex: 1; font-size: 13px; line-height: 1.4; cursor: pointer; }
.citem label.done { text-decoration: line-through; opacity: .4; }
.chint { display: block; font-family: 'DM Mono', monospace; font-size: 11px; margin-top: 2px; }
.chint-g { color: var(--sauge); }
.chint-o { color: var(--terra); }
.chint-y { color: var(--or); }
.cstore { font-size: 11px; color: var(--gris); display: block; margin-top: 1px; }

/* Section label */
.slbl { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gris); margin: 18px 0 10px; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-label">Menu · Famille · Belgique</div>

  <div class="week-row">

    <button class="wbtn" onclick="switchWeek(1,this)">S2<small>Burger 🍔</small></button>

    <button class="wbtn" onclick="switchWeek(3,this)">S4<small>Pancakes 🥞</small></button>
  </div>
</div>

<nav class="nav">
  <button class="nbtn" onclick="switchTab('menu',this)"><span class="ni">📅</span>Menu</button>

  <button class="nbtn" onclick="switchTab('snacks',this)"><span class="ni">🍎</span>Snacks</button>
  <button class="nbtn" onclick="switchTab('courses',this)"><span class="ni">🛒</span>Courses</button>
</nav>

<div id="content"></div>

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentWeek = 1; // index 0-3
let currentTab = 'menu';

// ═══════════════════════════════════════════
// TAG HELPERS
// ═══════════════════════════════════════════
const TAG_MAP = {
  af: ['t-af','Anti-friction ✓'],
  ex: ['t-ex','Express'],
  '4a':['t-4a','4 ans OK'],
  bt: ['t-bt','Batch ♻️'],
  tr: ['t-tr','Transversal ♻️'],
  cf: ['t-cf','Comfort Food 🧡'],
};
function renderTags(arr) {
  return '<div class="tags">' + arr.map(t => {
    const [cls,lbl] = TAG_MAP[t]||['',''];
    return `<span class="tag ${cls}">${lbl}</span>`;
  }).join('') + '</div>';
}

// ═══════════════════════════════════════════
// DAY → CSS class
// ═══════════════════════════════════════════
const DAY_CLASS = {Lundi:'dc-lundi',Mardi:'dc-mardi',Mercredi:'dc-mercredi',Jeudi:'dc-jeudi',Vendredi:'dc-vendredi',Samedi:'dc-samedi',Dimanche:'dc-dimanche'};

// ═══════════════════════════════════════════
// RENDERERS
// ═══════════════════════════════════════════
function renderMenu(s) {
  let h = `<div class="pbar"><strong>Protéines :</strong> ${s.proteines}</div>`;
  s.jours.forEach(j => {
    const dc = DAY_CLASS[j.jour]||'';
    h += `<div class="card ${dc}">
      <div class="mcard">
        <div class="mcard-day"><span class="mcard-emoji">${j.emoji}</span><span class="mcard-dayname">${j.jour}</span></div>
        <div class="mcard-body"><div class="mcard-plat">${j.plat}</div>${renderTags(j.tags)}</div>
        <div class="mcard-time">${j.temps}</div>
      </div>
    </div>`;
  });
  return h;
}

function renderBox(b) {
  const isbbat = b.type.startsWith('bbat');
  const cls = isbbat ? `bbat ${b.type}` : `box ${b.type}`;
  return `<div class="${cls}"><div class="blbl">${b.lbl}</div>${b.txt}</div>`;
}

function renderRecettes(s) {
  return s.recettes.map((r,i) => {
    const id = `r_${currentWeek}_${i}`;
    const ings = r.ings.map(x => `<li>${x}</li>`).join('');
    const steps = r.steps.map(x => `<li>${x}</li>`).join('');
    const boxes = (r.boxes||[]).map(renderBox).join('');
    return `<div class="rcard">
      <div class="rhead" onclick="toggleR('${id}')">
        <div class="rhead-left">
          <div class="rjour">${r.jour}</div>
          <div class="rtitre">${r.titre}</div>
          ${renderTags(r.tags)}
        </div>
        <span class="rchev" id="ch_${id}">▼</span>
      </div>
      <div class="rbody" id="rb_${id}">
        <div class="rsec">Ingrédients</div>
        <ul class="ings">${ings}</ul>
        <div class="rsec">Étapes</div>
        <ol class="steps">${steps}</ol>
        ${boxes}
      </div>
    </div>`;
  }).join('');
}

function renderPlanB(s) {
  const cards = s.planb.map(p => `
    <div class="pcard">
      <div class="pnum">${p.num}</div>
      <div class="ptitle">${p.titre}</div>
      <span class="pbadge">${p.badge}</span>
      <ul class="psteps">${p.steps.map(x=>`<li>${x}</li>`).join('')}</ul>
      <div class="pings">${p.ings}</div>
    </div>`).join('');
  const batch = `<div class="batch-box">
    <div class="batch-title">🗓️ Dimanche — Choix batch</div>
    <div class="bbat bbat-a"><div class="blbl">✅ Option A — Batch</div>${s.batchDimanche.a}</div>
    <div class="bbat bbat-b" style="margin-top:8px"><div class="blbl">😴 Option B — Normal</div>${s.batchDimanche.b}</div>
  </div>`;
  return `<div class="planb-intro">🆘 2 jokers 10 min · ingrédients déjà dans la liste · zéro course supplémentaire</div>${cards}${batch}`;
}

function renderSnacks(s) {
  return s.snacks.map(sn => `
    <div class="scard">
      <div class="shdr"><span class="semoji">${sn.emoji}</span><div class="stitle">${sn.titre}</div></div>
      <div class="swhen">${sn.quand}</div>
      <div class="show">${sn.how}</div>
      <div class="box b4a" style="margin-top:8px"><div class="blbl">🧒 4 ans</div>${sn.kids}</div>
    </div>`).join('');
}

function renderCourses(s) {
  const id_prefix = `s${currentWeek+1}`;
  let h = `<div class="budget">
    <div><div class="blabel">Budget estimé</div><div class="bsub">Intermarché + Delhaize</div></div>
    <div style="text-align:right"><div class="bamt">${s.budget}</div><div class="bsub">Objectif 120€±20€ ✓</div></div>
  </div>
  <div class="ctop">
    <span class="cpteur" id="cpteur">0 / 0 achetés</span>
    <button class="creset" onclick="resetAll()">↺ Tout décocher</button>
  </div>`;
  s.courses.forEach(cat => {
    const extraCls = cat.delhaize ? ' style="color:var(--terra)"' : '';
    h += `<div class="ccat"${extraCls}>${cat.cat}</div>`;
    cat.items.forEach(item => {
      const storedKey = `mf_${item.id}`;
      const hints = (item.hints||[]).map(hint => {
        const cls = hint.t==='g'?'chint-g':hint.t==='o'?'chint-o':'chint-y';
        return `<span class="chint ${cls}">${hint.v}</span>`;
      }).join('');
      const store = item.store ? `<span class="cstore">${item.store}</span>` : '';
      const dlCls = cat.delhaize ? ' delhaize' : '';
      h += `<div class="citem${dlCls}" onclick="clickItem(event,'${item.id}')">
        <input type="checkbox" id="${item.id}" onchange="checkItem(this)">
        <label for="${item.id}">${item.lbl}${hints}${store}</label>
      </div>`;
    });
  });
  return h;
}

// ═══════════════════════════════════════════
// RENDER DISPATCH
// ═══════════════════════════════════════════
function render() {
  const s = SEMAINES[currentWeek];
  let html = '';
  if (currentTab === 'menu') html = renderMenu(s);
  else if (currentTab === 'recettes') html = renderRecettes(s);
  else if (currentTab === 'planb') html = renderPlanB(s);
  else if (currentTab === 'snacks') html = renderSnacks(s);
  else if (currentTab === 'courses') html = renderCourses(s);
  document.getElementById('content').innerHTML = html;
  if (currentTab === 'courses') { restoreCourses(); updateCpteur(); }
}

// ═══════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════
function switchWeek(idx, btn) {
  currentWeek = parseInt(idx);
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  render();
}

function switchTab(name, btn) {
  currentTab = name;
  document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  render();
}

// ═══════════════════════════════════════════
// ACCORDEON RECETTES
// ═══════════════════════════════════════════
function toggleR(id) {
  const rb = document.getElementById('rb_'+id);
  const ch = document.getElementById('ch_'+id);
  if (!rb) return;
  const open = rb.classList.contains('open');
  rb.classList.toggle('open', !open);
  if (ch) ch.classList.toggle('open', !open);
}

// ═══════════════════════════════════════════
// CHECKLIST
// ═══════════════════════════════════════════
function checkItem(cb) {
  const lbl = document.querySelector(`label[for="${cb.id}"]`);
  if (cb.checked) {
    if (lbl) lbl.classList.add('done');
    try { localStorage.setItem('mf_'+cb.id,'1'); } catch(e){}
  } else {
    if (lbl) lbl.classList.remove('done');
    try { localStorage.removeItem('mf_'+cb.id); } catch(e){}
  }
  updateCpteur();
}

function clickItem(e, id) {
  if (e.target.tagName==='INPUT'||e.target.tagName==='LABEL') return;
  const cb = document.getElementById(id);
  if (!cb) return;
  cb.checked = !cb.checked;
  checkItem(cb);
}

function restoreCourses() {
  document.querySelectorAll('.citem input[type=checkbox]').forEach(cb => {
    try {
      if (localStorage.getItem('mf_'+cb.id)) {
        cb.checked = true;
        const lbl = document.querySelector(`label[for="${cb.id}"]`);
        if (lbl) lbl.classList.add('done');
      }
    } catch(e){}
  });
}

function updateCpteur() {
  const all = document.querySelectorAll('.citem input[type=checkbox]');
  const checked = document.querySelectorAll('.citem input[type=checkbox]:checked');
  const el = document.getElementById('cpteur');
  if (el) el.textContent = checked.length + ' / ' + all.length + ' achetés';
}

function resetAll() {
  document.querySelectorAll('.citem input[type=checkbox]').forEach(cb => {
    cb.checked = false;
    const lbl = document.querySelector(`label[for="${cb.id}"]`);
    if (lbl) lbl.classList.remove('done');
    try { localStorage.removeItem('mf_'+cb.id); } catch(e){}
  });
  updateCpteur();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init() {
  const wbtns = document.querySelectorAll('.wbtn');
  const nbtns = document.querySelectorAll('.nbtn');
  if (wbtns.length > 1) wbtns[1].classList.add('on');
  if (nbtns.length > 0) nbtns[0].classList.add('on');
  currentWeek = 1;
  currentTab = 'menu';
  render();
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
